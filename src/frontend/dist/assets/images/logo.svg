<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" result="glowed" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="glowed" />
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon outline (flat-top, padded 10px from edge) -->
  <!-- Vertices: top-left, top-right, right, bottom-right, bottom-left, left -->
  <polygon
    points="32,10 52,21 52,43 32,54 12,43 12,21"
    stroke="#00E5FF"
    stroke-width="2"
    stroke-linejoin="round"
    fill="none"
    opacity="0.85"
    filter="url(#glow)"
  />

  <!-- Center node -->
  <circle cx="32" cy="32" r="3.5" fill="#00E5FF" filter="url(#softglow)" />

  <!-- 3 radial spokes from center to alternate vertices (top, bottom-right, bottom-left) -->
  <!-- Top vertex -->
  <line x1="32" y1="28.5" x2="32" y2="13" stroke="#00E5FF" stroke-width="1.8" stroke-linecap="round" opacity="0.9" filter="url(#glow)" />
  <!-- Bottom-right vertex -->
  <line x1="34.9" y1="33.7" x2="49.5" y2="41.8" stroke="#00E5FF" stroke-width="1.8" stroke-linecap="round" opacity="0.9" filter="url(#glow)" />
  <!-- Bottom-left vertex -->
  <line x1="29.1" y1="33.7" x2="14.5" y2="41.8" stroke="#00E5FF" stroke-width="1.8" stroke-linecap="round" opacity="0.9" filter="url(#glow)" />

  <!-- Small node dots at spoke endpoints (on hex vertices) -->
  <circle cx="32" cy="13" r="2" fill="#00E5FF" opacity="0.7" filter="url(#glow)" />
  <circle cx="49.5" cy="41.8" r="2" fill="#00E5FF" opacity="0.7" filter="url(#glow)" />
  <circle cx="14.5" cy="41.8" r="2" fill="#00E5FF" opacity="0.7" filter="url(#glow)" />
</svg>
