<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#00B8D4" />
    </linearGradient>
  </defs>

  <!-- Database cylinder stack (bottom) -->
  <!-- Bottom cylinder -->
  <ellipse cx="32" cy="52" rx="14" ry="4.5" fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.6" filter="url(#glow)" />
  <line x1="18" y1="44.5" x2="18" y2="52" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.6" />
  <line x1="46" y1="44.5" x2="46" y2="52" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.6" />
  <ellipse cx="32" cy="44.5" rx="14" ry="4.5" fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.75" filter="url(#glow)" />

  <!-- Middle cylinder -->
  <line x1="18" y1="37.5" x2="18" y2="44.5" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.85" />
  <line x1="46" y1="37.5" x2="46" y2="44.5" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.85" />
  <ellipse cx="32" cy="37.5" rx="14" ry="4.5" fill="none" stroke="url(#cyanGrad)" stroke-width="2" filter="url(#glow)" />

  <!-- S letterform (top, dominant) -->
  <!-- S curve: top arc -->
  <path
    d="M 38 18 C 38 13.5 34 11 30 11 C 25 11 21 14 21 18.5 C 21 23 25 25 30 26.5 C 35 28 39 30 39 35 C 39 40 35 43 30 43 C 24.5 43 20 40 20 35.5"
    stroke="#00E5FF"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Connection dots — S meets cylinder -->
  <circle cx="32" cy="37.5" r="2" fill="#00E5FF" opacity="0.9" filter="url(#glow)" />
</svg>
