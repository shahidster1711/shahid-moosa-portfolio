name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: src/frontend
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build frontend
        working-directory: src/frontend
        run: pnpm build

      - name: Check deploy prerequisites
        id: check-deploy
        run: |
          if [[ -n "$FTP_SERVER" && -n "$FTP_USERNAME" && -n "$FTP_PASSWORD" ]]; then
            echo "should-deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: one or more FTP secrets (FTP_SERVER, FTP_USERNAME, FTP_PASSWORD) are not configured."
          fi
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Deploy to Hostinger via FTPS
        if: steps.check-deploy.outputs.should-deploy == 'true'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: src/frontend/dist/
          server-dir: public_html/
